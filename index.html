<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celik Räumkonzept</title>

<style>
:root{
  --primary:#2490ff;
  --primary-dark:#0f5fc4;
  --line:#dbe9f7;
}

body{
  margin:0;
  font-family:Arial;
  background:#ffffff;
}

/* ===== NAVBAR مع الخلفية ===== */
.navbar{
  background-image:url('header-bg.png');
  background-size:cover;
  background-position:center;
  position:relative;
}
.navbar::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0.6);
}

/* ===== HERO ===== */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  position:relative;
  overflow:hidden;
}

/* توهج أزرق */
.hero::before{
  content:"";
  position:absolute;
  width:700px;
  height:700px;
  background:radial-gradient(circle, rgba(36,144,255,0.2), transparent);
  top:-200px;
  right:-150px;
}

.hero::after{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle, rgba(36,144,255,0.15), transparent);
  bottom:-150px;
  left:-150px;
}

.container{
  width:1100px;
  max-width:95%;
  margin:auto;
  display:flex;
  align-items:center;
  gap:40px;
}

/* النص */
.left{
  flex:1;
}
.left h1{
  font-size:48px;
}
.left p{
  color:#666;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:14px 26px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
  border-radius:30px;
}

/* الصورة */
.right{
  flex:1;
}
.right img{
  width:100%;
  max-width:420px;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

/* ===== FOOTER مع الخلفية ===== */
.footer{
  background-image:url('footer-bg.png');
  background-size:cover;
  background-position:center;
  position:relative;
  color:#fff;
  padding:60px 20px;
}
.footer::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}
.footer *{
  position:relative;
}

/* موبايل */
@media(max-width:768px){
  .container{
    flex-direction:column;
    text-align:center;
  }
  .left h1{
    font-size:30px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="container">
    <h2>Celik Räumkonzept</h2>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="container">

    <!-- كلام يسار -->
    <div class="left">
      <h1>Wir bringen Glanz in Ihre Räume</h1>
      <p>
        Professionelle Reinigung, die sofort Vertrauen schafft.
        Sauber, schnell und zuverlässig – genau das, was Kunden erwarten.
      </p>
      <a href="#" class="btn">Jetzt anfragen</a>
    </div>

    <!-- صورة يمين -->
    <div class="right">
      <img src="cleaner.png">
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <h3>Celik Räumkonzept</h3>
    <p>Professionelle Reinigung mit modernem Auftritt</p>
  </div>
</footer>

</body>
</html>
